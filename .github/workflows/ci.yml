name: ci

# 검사 전용 — 배포는 Vercel 네이티브가 담당 (tech-stack.md §6.4).
# main 보호의 required check로 등록한다.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # .velite는 gitignore이고 entities가 @/.velite를 import하므로
      # lint/typecheck 전에 콘텐츠 타입을 먼저 생성한다.
      - name: Generate content (velite)
        run: pnpm exec velite --strict

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      # RSS(/feed.xml)는 빌드타임 프리렌더 시 getSiteUrl()로 절대 URL을 만든다.
      # env 누락 시 의도적으로 throw(fail-fast, test-plan §5.1-4)하므로 CI 빌드에도 주입한다.
      # 실 배포 도메인은 Vercel env에서 별도 설정. CI 검사용이라 repo 변수 없으면 기본값 사용.
      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || 'https://dongcoding.dev' }}
