name: ci

# 검사 전용 — 배포는 Vercel 네이티브가 담당 (tech-stack.md §6.4).
# main 보호의 required check로 등록한다.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      # .velite는 gitignore이고 entities가 @/.velite를 import하므로
      # lint/typecheck 전에 콘텐츠 타입을 먼저 생성한다.
      - name: Generate content (velite)
        run: pnpm exec velite --strict

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
