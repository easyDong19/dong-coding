name: commit lint

# 스쿼시 머지 시 PR 제목이 곧 main 커밋 메시지가 되므로, PR 제목을 커밋 컨벤션으로 강제한다.
# (branch-strategy.md §6 · commit-convention.md) — 이 job을 main 보호의 required check로 등록한다.
on:
  pull_request:
    types: [opened, edited, synchronize, reopened]

permissions:
  pull-requests: read

jobs:
  pr-title:
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # commit-convention.md의 7개 타입만 허용
          types: |
            feat
            fix
            post
            docs
            style
            refactor
            chore
          requireScope: false
          # 제목 끝 마침표 금지 (commitlint subject-full-stop과 동일 취지)
          subjectPattern: ^(?!.*\.$).+$
          subjectPatternError: |
            PR 제목의 제목부는 마침표로 끝나면 안 됩니다: "{subject}"
